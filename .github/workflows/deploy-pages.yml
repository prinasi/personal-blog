name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build static site
        env:
          NEXT_PUBLIC_GITHUB_OWNER: ${{ github.repository_owner }}
          NEXT_PUBLIC_GITHUB_REPO: ${{ github.event.repository.name }}
          NEXT_PUBLIC_GITHUB_BRANCH: main
        run: |
          if [ "${{ github.event.repository.name }}" = "${{ github.repository_owner }}.github.io" ]; then
            export NEXT_PUBLIC_BASE_PATH=""
            export NEXT_PUBLIC_SITE_URL="https://${{ github.repository_owner }}.github.io"
          else
            export NEXT_PUBLIC_BASE_PATH="/${{ github.event.repository.name }}"
            export NEXT_PUBLIC_SITE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          fi
          pnpm build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
